name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
        env:
          DATABASE_URL: postgres://stub:stub@localhost:5432/stub
          DEEPSEEK_API_KEY: stub
          GITHUB_TOKEN: stub
          VAULT_REPO: stub/stub
          INGEST_SECRET: stub
