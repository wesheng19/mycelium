language: en
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/package-lock.json"
    - "!**/.next/**"
    - "!**/node_modules/**"
chat:
  auto_reply: true
